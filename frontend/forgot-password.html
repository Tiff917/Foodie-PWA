<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Forgot Password</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        /* 共用 RWD 樣式 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { 
            background-color: #E3D5CA; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
            overflow-x: hidden; 
            width: 100%;
            width: 100%;
            position: fixed;
            overflow: hidden;
        }
        
        .auth-card {
            width: 100%; max-width: 400px; background-color: #F5EBE1; border-radius: 30px; padding: 40px 30px;
            box-shadow: 0 15px 35px rgba(109, 93, 85, 0.15); display: flex; flex-direction: column; align-items: center; position: relative;
        }

        @media screen and (max-width: 480px) {
            body { padding: 0; background-color: #F5EBE1; align-items: flex-start;overflow-x: hidden; width: 100%;}
            .auth-card { max-width: 100%; min-height: 100vh; border-radius: 0; box-shadow: none; justify-content: center; padding-top: 60px; }
        }

        .back-btn { position: absolute; top: 30px; left: 20px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #6D5D55; font-size: 32px; text-decoration: none; }
        .title { font-size: 26px; font-weight: 700; color: #6D5D55; margin-top: 40px; margin-bottom: 40px; }
        
        .input-wrapper { width: 100%; background-color: #FFFFFF; border-radius: 12px; padding: 15px; display: flex; align-items: center; gap: 12px; margin-bottom: 30px; transition: all 0.3s; }
        .input-wrapper.error { border: 1px solid #ff6b6b; background-color: #fff5f5; }
        .input-wrapper i { color: #bfa093; font-size: 20px; }
        .input-wrapper input { border: none; background: transparent; width: 100%; outline: none; font-size: 16px; color: #5c4b45; }
        
        .submit-btn { width: 100%; padding: 16px; background-color: #D7BDB0; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(215, 189, 176, 0.5); transition: transform 0.1s; }
        .submit-btn:active { transform: scale(0.98); background-color: #c4a89a; }
    </style>
</head>
<body>
    <div class="auth-card">
        <a href="login.html" target="_top" class="back-btn"><i class='bx bx-chevron-left'></i></a>
        <div class="title">Forgot Password?</div>
        <div class="input-wrapper" id="emailWrapper">
            <i class='bx bx-envelope'></i>
            <input type="email" id="emailInput" placeholder="Gmail">
        </div>
        <button class="submit-btn" id="submitBtn">Submit</button>
    </div>

    <script src="config.js"></script>
    <script>
        // 進入頁面時，通知外層殼層鎖定滑動
        window.parent.postMessage('lockSwiping', '*');

        // 離開頁面準備跳轉前，解鎖滑動
        window.addEventListener('beforeunload', () => {
            window.parent.postMessage('unlockSwiping', '*');
        });

        const submitBtn = document.getElementById('submitBtn');
        const emailInput = document.getElementById('emailInput');
        const emailWrapper = document.getElementById('emailWrapper');

        // --- 核心送出邏輯 ---
        function handleSubmit() {
            const email = emailInput.value.trim();
            
            // 1. 基本格式驗證
            if (!email || !validateEmail(email)) {
                emailWrapper.classList.add('error');
                // 如果沒輸入，可以震動手機（若支援）
                if (window.navigator.vibrate) window.navigator.vibrate(50);
                return;
            }

            // 2. 顯示處理中狀態
            submitBtn.disabled = true;
            submitBtn.textContent = "Sending Code...";

            // 3. 【關鍵對接】：將 Email 先存入臨時位置，防止 OTP 頁面抓不到身分
            localStorage.setItem('temp_reset_email', email);
            
            // 4. 模擬 API 發送延遲 (UX 體驗更真實)
            setTimeout(() => {
                console.log("OTP 已發送至:", email);
                
                // 跳轉到 otp_verify.html
                // 使用 window.top 確保是在最外層跳轉，而不是在 iframe 內跳轉
                window.top.location.href = `otp_verify.html?email=${encodeURIComponent(email)}`; 
            }, 800);
        }

        // Email 正規表達式檢查
        function validateEmail(email) {
            return String(email)
                .toLowerCase()
                .match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/);
        }

        // --- 事件監聽 ---

        submitBtn.addEventListener('click', handleSubmit);

        // Enter 鍵觸發
        emailInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleSubmit();
            }
        });

        // 輸入時移除錯誤樣式
        emailInput.addEventListener('input', () => {
            emailWrapper.classList.remove('error');
        });

        // 自動聚焦，方便使用者直接輸入
        window.onload = () => emailInput.focus();

    </script>
</body>
</html>
