<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login Screen - Morandi Palette</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#D7BDB0">
    <!-- iOS PWA 支援 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Foodie">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('🚀 PWA: Service Worker 註冊成功', reg.scope))
                    .catch(err => console.log('❌ PWA: Service Worker 註冊失敗', err));
            });
        }
    </script>
    <style>
        /* CSS 重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* 預設樣式 (桌面/大螢幕)：保持原本的手機模擬外觀 */
        body {
            background-color: #E3D5CA; /* 外部米膚色 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: fixed;
            width: 100%;
            overflow: hidden;
            /* ★ 加入這兩行來鎖死左右滑動 ★ */
            overflow-x: hidden; 
            width: 100%;
        }

        /* 手機容器 */
        .phone-container {
            width: 375px;
            height: 762px; /* 模擬 iPhone 高度 */
            background-color: #F5EBE1; /* 內部奶油色 */
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(100, 80, 70, 0.15);
            position: relative;
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* 防止內容溢出 */
            transition: all 0.3s ease; /* 讓切換視窗大小時有過渡效果 */
        }

        /* 動態島 & 狀態列 & 底部橫條 (模擬手機 UI) */
        .notch, .status-bar, .home-indicator {
            display: block; /* 桌面版顯示 */
        }

        .notch {
            width: 120px;
            height: 35px;
            background-color: #000000;
            border-radius: 20px;
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
            color: #000000;
            margin-top: 5px;
            margin-bottom: 40px; /* 稍微調整間距 */
            padding: 0 10px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            flex-grow: 1; /* 讓標題區塊可以彈性佔據空間 */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 500;
            line-height: 1.3;
            color: #6D5D55; 
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 10px;
        }

        .input-wrapper {
            background-color: #FFFFFF;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid transparent;
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        
        .input-wrapper.error {
            border: 1px solid #ff4d4d;
            animation: shake 0.3s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .input-wrapper i {
            color: #bfa093; 
            font-size: 22px;
        }

        .input-wrapper input {
            border: none;
            background: transparent;
            width: 100%;
            outline: none;
            font-size: 16px;
            color: #5c4b45;
        }

        .input-wrapper input::placeholder {
            color: #bbafa9;
        }

        .forgot-password {
            text-align: right;
            margin-top: 15px;
            margin-bottom: 30px;
        }

        .forgot-password a {
            text-decoration: none;
            color: #a89993; 
            font-size: 13px;
            font-weight: 500;
            transition: color 0.3s;
        }
        
        .forgot-password a:hover {
            color: #6D5D55;
        }

        .login-btn {
            width: 100%;
            padding: 18px;
            background-color: #D7BDB0;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            box-shadow: 0 8px 15px rgba(215, 189, 176, 0.4);
        }

        .login-btn:hover {
            background-color: #cbb0a3;
            transform: translateY(-2px);
        }

        .login-btn:active {
            transform: translateY(1px);
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            margin-bottom: 40px; /* 留出底部空間 */
            font-size: 13px;
            color: #9c8e87;
        }

        .footer a {
            text-decoration: none;
            color: #6D5D55; 
            font-weight: bold;
        }
        
        .home-indicator {
            width: 130px;
            height: 5px;
            background-color: #2c2c2c;
            border-radius: 3px;
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* ========================================= */
        /* RWD 響應式設計：針對手機螢幕 (寬度小於 480px) */
        /* ========================================= */
        @media screen and (max-width: 480px) {
            body {
                /* 手機版直接使用內層背景色，避免出現兩層顏色 */
                background-color: #F5EBE1; 
                align-items: flex-start; /* 確保內容從頂部開始 */
                /* ★ 確保手機版也鎖死 ★ */
                overflow-x: hidden;
            }

            .phone-container {
                /* 寬度填滿，高度至少填滿視窗 */
                width: 100%;
                min-height: 100vh; 
                height: auto;
                
                /* 移除外框特徵，變成原生 App 感覺 */
                border-radius: 0;
                box-shadow: none;
                margin: 0;
                padding: 40px 30px; /* 增加頂部間距 */
            }

            /* 隱藏手機模擬元素 (因為真手機本身就有) */
            .notch, .status-bar, .home-indicator {
                display: none;
            }

            .header {
                /* 在手機上，標題不需要那麼多下方間距，因為鍵盤彈起會壓縮空間 */
                margin-bottom: 40px;
            }

            .footer {
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="notch"></div>
        <div class="status-bar">
            
        </div>

        <div class="header">
            <h1>Make a memory<br>with us</h1>
        </div>

        <div class="form-group">
            <div class="input-wrapper" id="emailWrapper">
                <i class='bx bx-envelope'></i>
                <input type="email" id="emailInput" placeholder="G-mail" autocomplete="email">
            </div>

            <div class="input-wrapper" id="passwordWrapper">
                <i class='bx bx-lock-alt'></i>
                <input type="password" id="passwordInput" placeholder="Password" autocomplete="current-password">
                <i class='bx bx-hide' id="togglePassword" style="cursor: pointer; color: #bfa093;"></i>
            </div>
        </div>

        <div class="forgot-password">
            <a href="forgot-password.html" target="_top">Forgot password?</a>
        </div>

        <button class="login-btn" id="loginBtn">Log in</button>

        <div class="footer">
            <p>Don't have an account? <a href="signup.html" target="_top">Sign up</a></p>
        </div>
        
        <div class="home-indicator"></div>
    </div>

    <script src="config.js"></script>
    <script>
        // --- 1. 配置與初始化 ---
        const API_BASE_URL = DB_CONFIG.apiUrl.replace(/\/$/, '');
        const dbName = DB_CONFIG.name;
        const dbVersion = DB_CONFIG.version;
        let db;

        // ★ 核心修正：防止狂閃。如果已經有 Email，且不是剛剛點登出，就直接回首頁
        const userEmail = localStorage.getItem('myProfileEmail');
        if (userEmail && !window.location.search.includes('status=loggedout')) {
            window.top.location.href = 'index.html'; 
        }
        
        // 進入時鎖定滑動
        window.parent.postMessage('lockSwiping', '*');
        window.addEventListener('beforeunload', () => window.parent.postMessage('unlockSwiping', '*'));

        // --- 2. 資料庫初始化 ---
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(dbName, dbVersion);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains("user_profile")) {
                        db.createObjectStore("user_profile");
                    }
                    if (!db.objectStoreNames.contains("posts_timeline")) {
                        db.createObjectStore("posts_timeline", { keyPath: "id" });
                    }
                };
                request.onsuccess = (e) => {
                    db = e.target.result;
                    resolve(db);
                };
                request.onerror = (e) => reject(e.target.error);
            });
        }

        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('passwordInput');
        const emailInput = document.getElementById('emailInput');
        const loginBtn = document.getElementById('loginBtn');
        const emailWrapper = document.getElementById('emailWrapper');
        const passwordWrapper = document.getElementById('passwordWrapper');

        togglePassword.addEventListener('click', function () {
            const isPw = passwordInput.type === 'password';
            passwordInput.type = isPw ? 'text' : 'password';
            this.classList.toggle('bx-hide', !isPw);
            this.classList.toggle('bx-show', isPw);
        });

        // --- 3. 登入邏輯 ---
        loginBtn.addEventListener('click', async function () {
            const emailValue = emailInput.value.trim();
            const passwordValue = passwordInput.value.trim();
            
            emailWrapper.classList.remove('error');
            passwordWrapper.classList.remove('error');

            if (!emailValue || !passwordValue) {
                if (!emailValue) emailWrapper.classList.add('error');
                if (!passwordValue) passwordWrapper.classList.add('error');
                return;
            }

            loginBtn.textContent = 'Verifying...';
            loginBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailValue, password: passwordValue })
                });

                const data = await response.json();

                if (response.ok) {
                    console.log("✅ 登入成功，正在快速同步環境...");

                    // A. 快速存入關鍵資訊
                    localStorage.setItem('myProfileEmail', data.email);
                    localStorage.setItem('myProfileName', data.name);
                    localStorage.setItem('isPremiumUser', data.is_premium.toString());
                    if (data.avatar_url) {
                        localStorage.setItem('myProfileAvatar', data.avatar_url);
                    }

                    // B. 「溫和式」清理資料庫：改用 clear 取代重刪
                    const db = await initDB();
                    const tx = db.transaction(["user_profile", "posts_timeline"], "readwrite");
                    
                    // 清空舊帳號資料
                    tx.objectStore("user_profile").clear();
                    tx.objectStore("posts_timeline").clear();
                    
                    // 寫入新帳號基本資訊
                    const profileStore = tx.objectStore("user_profile");
                    profileStore.put(data.name, "username");
                    if (data.avatar_url) profileStore.put(data.avatar_url, "avatar_remote_url");

                    tx.oncomplete = () => {
                        console.log("👋 環境優化完成，即刻跳轉");
                        // 使用 replace 取代 href，防止瀏覽器回退卡頓
                        window.top.location.replace("index.html"); 
                    };

                    tx.onerror = (err) => {
                        console.error("❌ 清理失敗:", err);
                        window.top.location.replace("index.html");
                    };
                } else {
                    alert(data.detail || "Login failed.");
                    resetBtn();
                }
            } catch (error) {
                console.error(error);
                alert('Connection failed.');
                resetBtn();
            }
        });

        function resetBtn() {
            loginBtn.textContent = 'Log in';
            loginBtn.disabled = false;
            emailWrapper.classList.add('error');
            passwordWrapper.classList.add('error');
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });

        // 初始化資料庫連線
        initDB(); 
    </script>
</body>
</html>
